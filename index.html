<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#1A1A1A">
    <title>Presuya — Presupuestos fáciles</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/svg+xml" href="assets/icons/icon.svg">
    <link rel="apple-touch-icon" href="assets/icons/icon.svg">
    <link rel="stylesheet" href="css/styles.css">
    <script>
    (function(){try{var c=localStorage.getItem('presu_brand_color');if(!c||!/^#[0-9a-f]{6}$/i.test(c))return;var m=c.replace('#','').match(/.{2}/g);var r=parseInt(m[0],16),g=parseInt(m[1],16),b=parseInt(m[2],16);var dk=function(f){return'#'+[r,g,b].map(function(v){var h=Math.round(v*(1-f)).toString(16);return h.length===1?'0'+h:h}).join('')};var lt=function(f){return'#'+[r,g,b].map(function(v){var h=Math.round(v+(255-v)*f).toString(16);return h.length===1?'0'+h:h}).join('')};var s=document.documentElement.style;s.setProperty('--primary',c);s.setProperty('--primary-dark',dk(0.14));s.setProperty('--primary-light',lt(0.88));s.setProperty('--primary-glow','rgba('+r+','+g+','+b+',0.18)');var mt=document.querySelector('meta[name="theme-color"]');if(mt)mt.content=c;}catch(e){}})();
    </script>
</head>
<body>

    <div class="auth-shell">
        <div class="auth-card">
            <div class="auth-brand">
                <div class="big-logo">P</div>
                <h1>Presuya</h1>
                <div class="tagline">Presupuestos profesionales en segundos</div>
            </div>

            <form id="loginForm" class="auth-form">
                <div class="field">
                    <label for="loginEmail">Email</label>
                    <input type="email" id="loginEmail" autocomplete="email" required>
                </div>
                <div class="field">
                    <label for="loginPassword">Contraseña</label>
                    <input type="password" id="loginPassword" autocomplete="current-password" required>
                </div>
                <button type="submit" class="btn btn-primary btn-block">Ingresar</button>
                <div style="text-align:center;margin-top:10px;">
                    <button type="button" class="btn-link" id="forgotPwd">¿Olvidaste tu contraseña?</button>
                </div>
            </form>

            <div class="auth-foot">
                <strong>¿Querés usar Presuya?</strong><br>
                Escribinos a <a href="https://wa.me/595992316979?text=Hola%2C%20quiero%20activar%20mi%20cuenta%20de%20Presuya" target="_blank" rel="noopener">WhatsApp</a> y te damos tu cuenta.
                <div style="margin-top:12px;font-size:12px;">
                    <a href="ayuda.html" style="color:var(--gray-500);text-decoration:underline;">Ver cómo funciona</a>
                </div>
            </div>
        </div>
    </div>

    <div id="toast" class="toast"></div>
    <div id="loading" class="loading-overlay hidden"><div class="spinner"></div></div>

    <script type="module" src="js/auth.js"></script>
</body>
</html>
