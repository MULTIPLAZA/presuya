<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#1A1A1A">
    <title>Mi Negocio — Presuya</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/svg+xml" href="assets/icons/icon.svg">
    <link rel="apple-touch-icon" href="assets/icons/icon.svg">
    <link rel="stylesheet" href="css/styles.css">
    <script>
    (function(){try{var c=localStorage.getItem('presu_brand_color');if(!c||!/^#[0-9a-f]{6}$/i.test(c))return;var m=c.replace('#','').match(/.{2}/g);var r=parseInt(m[0],16),g=parseInt(m[1],16),b=parseInt(m[2],16);var dk=function(f){return'#'+[r,g,b].map(function(v){var h=Math.round(v*(1-f)).toString(16);return h.length===1?'0'+h:h}).join('')};var lt=function(f){return'#'+[r,g,b].map(function(v){var h=Math.round(v+(255-v)*f).toString(16);return h.length===1?'0'+h:h}).join('')};var s=document.documentElement.style;s.setProperty('--primary',c);s.setProperty('--primary-dark',dk(0.14));s.setProperty('--primary-light',lt(0.88));s.setProperty('--primary-glow','rgba('+r+','+g+','+b+',0.18)');var mt=document.querySelector('meta[name="theme-color"]');if(mt)mt.content=c;}catch(e){}})();
    </script>
</head>
<body>

    <div class="app">

        <header class="app-header">
            <div class="brand-mini">
                <div class="logo-dot">P</div>
                <h1>Mi Negocio</h1>
            </div>
            <div style="display:flex;gap:8px;align-items:center;">
                <a href="ayuda.html" class="help-link" title="Ayuda" aria-label="Ayuda">?</a>
                <button class="icon-btn" id="btnLogout" title="Cerrar sesión" type="button">⏻</button>
            </div>
        </header>

        <main class="page">

            <div id="onboardingIntro" class="card hidden" style="background:var(--primary-light);border-left:4px solid var(--primary);">
                <h2 style="border:none;padding:0;margin-bottom:6px;">Bienvenido a Presuya</h2>
                <p style="font-size:14px;color:var(--gray-700);">Completá los datos de tu negocio. Van a aparecer en todos los presupuestos que emitas.</p>
            </div>

            <div class="avatar-upload">
                <div class="avatar-preview" id="avatarPreview">
                    <span id="avatarPlaceholder">📷</span>
                </div>
                <input type="file" id="logoFile" accept="image/png,image/jpeg,image/webp,image/svg+xml">
                <button type="button" class="btn btn-secondary" id="btnPickLogo">Cambiar logo</button>
                <div style="font-size:11px;color:var(--gray-500);text-align:center;">PNG, JPG o WebP — máx 500KB</div>
            </div>

            <form id="perfilForm">
                <div class="card">
                    <h2>Datos del negocio</h2>
                    <div class="field">
                        <label for="nombreNegocio">Nombre / Razón social *</label>
                        <input type="text" id="nombreNegocio" required placeholder="Ej: NODO Informática">
                    </div>
                    <div class="field-row">
                        <div class="field">
                            <label for="ruc">RUC</label>
                            <input type="text" id="ruc" placeholder="Ej: 3778760-8">
                        </div>
                    </div>
                    <div class="field">
                        <label for="direccion">Dirección</label>
                        <input type="text" id="direccion" placeholder="Ej: Silvano Godoy c/ O'Leary, San Lorenzo">
                    </div>
                    <div class="field-row">
                        <div class="field">
                            <label for="telefono">Teléfono / WhatsApp</label>
                            <input type="tel" id="telefono" placeholder="Ej: 0992316979">
                        </div>
                    </div>
                    <div class="field">
                        <label for="emailContacto">Email de contacto</label>
                        <input type="email" id="emailContacto" placeholder="Ej: info@tunegocio.com">
                    </div>
                    <div class="field">
                        <label for="web">Web (opcional)</label>
                        <input type="text" id="web" placeholder="Ej: www.tunegocio.com">
                    </div>
                </div>

                <div class="card">
                    <h2>Preferencias de presupuestos</h2>
                    <div class="field">
                        <label for="colorPrimario">Color de marca</label>
                        <input type="color" id="colorPrimario" value="#F5A623">
                        <div class="hint">Se usa en el header y el total del PDF</div>
                    </div>
                    <div class="field">
                        <label for="validezDefault">Validez por defecto (días)</label>
                        <input type="number" id="validezDefault" min="1" max="90" value="15">
                    </div>
                    <div class="field">
                        <label for="formaPagoDefault">Forma de pago por defecto</label>
                        <input type="text" id="formaPagoDefault" value="Contado, transferencia o tarjeta">
                    </div>
                </div>

                <div class="actions-stack">
                    <button type="submit" class="btn btn-primary btn-block">Guardar y continuar</button>
                    <button type="button" class="btn btn-ghost btn-block" id="btnSkipToDash">Ir al panel</button>
                </div>
            </form>

        </main>

        <nav class="bottom-nav">
            <a href="dashboard.html"><span class="nav-icon">📋</span><span>Presupuestos</span></a>
            <a href="editor.html"><span class="nav-icon">➕</span><span>Nuevo</span></a>
            <a href="perfil.html" class="active"><span class="nav-icon">👤</span><span>Mi Negocio</span></a>
        </nav>

    </div>

    <div id="toast" class="toast"></div>
    <div id="loading" class="loading-overlay hidden"><div class="spinner"></div></div>

    <script type="module" src="js/perfil.js"></script>
</body>
</html>
